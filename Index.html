<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treecetrain">
<meta name="theme-color" content="#0d0d0d">
<title>Treecetrain</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--bg2:#181818;--bg3:#222;--border:#333;--text:#f5f5f5;--text2:#888;--accent:#e01a1a;--abright:#ff3333;--accent2:#ff6b35;--success:#3ddc68;--danger:#ff4444;--r:14px;--rs:9px}
.light{--bg:#f0f0f0;--bg2:#e2e2e2;--bg3:#d4d4d4;--border:#bbb;--text:#111;--text2:#666;--accent:#cc0000;--abright:#ee1111;--success:#009944;--danger:#cc2222}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* NAV */
nav{display:flex;justify-content:space-around;align-items:center;padding:8px 0 max(10px,env(safe-area-inset-bottom));background:var(--bg2);border-top:2px solid var(--accent);position:fixed;bottom:0;left:0;right:0;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:5px 10px;transition:all .2s;letter-spacing:.08em;text-transform:uppercase}
.nb svg{width:20px;height:20px}
.nb.active{color:var(--abright)}
.nb.active svg{filter:drop-shadow(0 0 5px var(--accent))}
/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;padding:16px 14px calc(76px + env(safe-area-inset-bottom));padding-top:max(18px,env(safe-area-inset-top))}
.screen.active{display:block}
/* HEADER */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.pt{font-size:30px;font-weight:900;letter-spacing:-.01em;text-transform:uppercase}
.pt span{color:var(--abright)}
.logo{font-size:26px;font-weight:900;letter-spacing:.02em;text-transform:uppercase}
.logo .r{color:var(--abright)}.logo .g{color:var(--text2);font-size:20px}.logo .b{color:var(--text)}
/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;width:100%}
.btn-p{background:var(--accent);color:#fff}
.btn-p:active{background:#a01010;transform:scale(.97)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-s:active{border-color:var(--accent)}
.btn-sm{padding:7px 12px;font-size:13px;width:auto}
.btn-ic{width:36px;height:36px;padding:0}
/* INPUTS */
.ig{margin-bottom:12px}
.il{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:5px;display:block}
input[type=text],input[type=number],select,textarea{width:100%;padding:10px 12px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;-webkit-appearance:none;appearance:none;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--accent)}
select option{background:var(--bg2)}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.b-up{background:rgba(224,26,26,.18);color:var(--abright)}
.b-lo{background:rgba(255,107,53,.18);color:#ff8855}
.b-ca{background:rgba(61,220,104,.15);color:var(--success)}
.b-ru{background:rgba(61,220,104,.15);color:var(--success)}
/* DASHBOARD */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.sc .v{font-size:28px;font-weight:900;color:var(--abright)}
.sc .l{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:1px}
.sbar{display:flex;gap:3px;margin-top:8px}
.sd{flex:1;height:7px;border-radius:4px;background:var(--bg3)}
.sd.done{background:var(--accent)}
.rl{display:flex;flex-direction:column;gap:7px}
.ri{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs)}
.rin{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.rid{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:2px}
.tt{background:var(--bg3);border:1px solid var(--border);width:36px;height:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
/* PROGRAMMES */
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.pch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pcn{font-size:20px;font-weight:900;text-transform:uppercase}
.pbt{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pbt::after{content:'';flex:1;height:1px;background:var(--border)}
.pe{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;background:var(--bg3);border-radius:var(--rs);margin-bottom:4px}
.pen{font-size:13px;font-weight:700}
.pem{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.pr{font-size:10px;color:var(--text2);text-align:right;margin-top:2px;margin-bottom:6px;font-family:'DM Mono',monospace}
.pfin{font-size:11px;font-weight:700;color:var(--accent2);padding:6px 9px;background:rgba(255,107,53,.1);border-radius:var(--rs);margin-top:4px}
/* SESSION */
.shb{display:flex;justify-content:space-between;align-items:flex-start;padding:max(18px,env(safe-area-inset-top)) 14px 0}
.sb{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.sbt{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sbt::after{content:'';flex:1;height:1px;background:var(--border)}
.se{margin-bottom:12px}
.se:last-child{margin-bottom:0}
.seh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sen{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:7px;background:var(--bg3);border-radius:var(--rs)}
.sn{font-size:11px;font-weight:700;color:var(--text2);width:18px;font-family:'DM Mono',monospace;text-align:center;flex-shrink:0}
.si{flex:1;padding:5px 6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;min-width:0}
.ss{font-size:12px;color:var(--text2);flex-shrink:0}
.sd2{width:30px;height:30px;border-radius:7px;border:2px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.sd2.ck{background:var(--success);border-color:var(--success)}
.rbar{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:rgba(224,26,26,.08);border:1px solid rgba(224,26,26,.2);border-radius:var(--rs);margin:4px 0 10px;font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.06em}
.rbtn{font-size:11px;font-weight:800;color:var(--abright);background:none;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em}
.sfin{padding:10px 12px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:var(--rs);margin-bottom:10px}
.sfin-t{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--accent2);text-transform:uppercase;margin-bottom:4px}
.pbo{height:5px;background:var(--bg3);border-radius:3px;margin:8px 14px 0;overflow:hidden}
.pbi{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
/* TIMER */
#to{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
#to.vis{display:flex}
.tr{position:relative;width:210px;height:210px;margin-bottom:18px}
.tr svg{transform:rotate(-90deg)}
.tr circle{fill:none;stroke-width:5}
.tbg{stroke:#2a2a2a}
.tpc{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.tt2{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ts{font-size:54px;font-weight:900;font-family:'DM Mono',monospace;color:var(--abright);line-height:1}
.tu{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:2px}
.tl{font-size:12px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.tpre{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.tpr{padding:6px 11px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:800;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;transition:all .15s}
.tpr.act{border-color:var(--accent);color:var(--abright);background:rgba(224,26,26,.12)}
.tcr{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ta{display:flex;gap:10px}
/* HISTORIQUE */
.hi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:9px}
.hih{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.hin{font-size:17px;font-weight:900;text-transform:uppercase}
.hid{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.hs{display:flex;gap:10px;flex-wrap:wrap}
.hst{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.hst strong{color:var(--text)}
/* PROGRESS */
.pch2{height:100px;background:var(--bg3);border-radius:var(--rs);margin-top:8px;overflow:hidden;position:relative}
.cb{position:absolute;bottom:0;background:var(--accent);border-radius:3px 3px 0 0;transition:height .4s;min-width:6px}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:150;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.mo.vis{display:flex}
.md{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;border-top:2px solid var(--accent);padding:18px 14px calc(20px + env(safe-area-inset-bottom));width:100%;max-height:88vh;overflow-y:auto}
.mt{font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.02em;margin-bottom:16px}
.ma{display:flex;gap:8px;margin-top:16px}
.ma .btn{flex:1}
/* MISC */
.sep{height:1px;background:var(--border);margin:12px 0}
.es{text-align:center;color:var(--text2);padding:32px 20px;font-size:14px;font-weight:600}
.es .ic{font-size:34px;margin-bottom:8px}
.fr{display:flex;gap:8px}
.fr .ig{flex:1}
.stl{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.tsel{display:flex;gap:7px;flex-wrap:wrap}
.tag{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;background:var(--bg3);text-transform:uppercase;letter-spacing:.06em}
.tag.sel.upper{background:rgba(224,26,26,.2);border-color:var(--accent);color:var(--abright)}
.tag.sel.lower{background:rgba(255,136,85,.2);border-color:#ff8855;color:#ff8855}
.tag.sel.running,.tag.sel.cardio{background:rgba(61,220,104,.15);border-color:var(--success);color:var(--success)}
.del{background:none;border:none;cursor:pointer;color:var(--danger);padding:4px;font-size:14px}
.aer{display:flex;align-items:center;gap:6px;padding:9px;border:1px dashed var(--border);border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:13px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.06em}
.done-sc{text-align:center;padding:40px 16px}
.done-sc .di{font-size:58px;margin-bottom:12px}
.done-sc .dt{font-size:34px;font-weight:900;text-transform:uppercase;margin-bottom:6px}
.done-sc .ds{font-size:14px;color:var(--text2);margin-bottom:18px;font-family:'DM Mono',monospace}
.vb{font-size:12px;background:rgba(61,220,104,.15);color:var(--success);padding:3px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-weight:700}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
  <div id="screen-dashboard" class="screen active">
    <div class="ph">
      <div class="logo"><span class="r">TREE</span><span class="g">CE</span><span class="b">TRAIN</span></div>
      <div class="tt" id="theme-toggle" onclick="toggleTheme()">🌙</div>
    </div>
    <div id="dc"></div>
  </div>
  <div id="screen-programmes" class="screen">
    <div class="ph"><div class="pt">MES <span>PROGS</span></div><button class="btn btn-p btn-sm btn-ic" onclick="openNewProg()">+</button></div>
    <div id="pl"></div>
  </div>
  <div id="screen-session" class="screen" style="padding:0"><div id="sc"></div></div>
  <div id="screen-historique" class="screen">
    <div class="ph"><div class="pt">HISTO<span>RIQUE</span></div></div>
    <div id="hc"></div>
  </div>
  <div id="screen-progress" class="screen">
    <div class="ph"><div class="pt">PRO<span>GRÈS</span></div></div>
    <div id="pgc"></div>
  </div>
  <nav>
    <button class="nb active" data-s="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home
    </button>
    <button class="nb" data-s="programmes" onclick="go('programmes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Progs
    </button>
    <button class="nb" data-s="session" onclick="go('session')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg>Séance
    </button>
    <button class="nb" data-s="historique" onclick="go('historique')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>Histo
    </button>
    <button class="nb" data-s="progress" onclick="go('progress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progrès
    </button>
  </nav>
</div>

<!-- TIMER -->

<div id="to">
  <div class="tr">
    <svg width="210" height="210" viewBox="0 0 210 210">
      <circle class="tbg" cx="105" cy="105" r="92"/>
      <circle class="tpc" id="tpc" cx="105" cy="105" r="92" stroke-dasharray="578" stroke-dashoffset="0"/>
    </svg>
    <div class="tt2"><div class="ts" id="td">90</div><div class="tu" id="tu">sec</div></div>
  </div>
  <div class="tl">REPOS</div>
  <div class="tpre">
    <div class="tpr" data-s="45" onclick="setT(this,45)">45s</div>
    <div class="tpr" data-s="60" onclick="setT(this,60)">1 min</div>
    <div class="tpr act" data-s="90" onclick="setT(this,90)">1:30</div>
    <div class="tpr" data-s="120" onclick="setT(this,120)">2 min</div>
    <div class="tpr" data-s="180" onclick="setT(this,180)">3 min</div>
  </div>
  <div class="tcr">
    <span class="il" style="margin:0;white-space:nowrap">Perso :</span>
    <input type="number" id="tci" placeholder="sec" min="10" max="180" style="width:70px;padding:7px;text-align:center" oninput="setTCustom(this.value)">
    <span class="il" style="margin:0">sec</span>
  </div>
  <div class="ta">
    <button class="btn btn-s btn-sm" onclick="skipT()">Passer</button>
    <button class="btn btn-p btn-sm" id="tpb" onclick="pauseT()">Pause</button>
  </div>
</div>

<!-- MODAL PROGRAMME -->

<div id="mp" class="mo" onclick="cm('mp')">
  <div class="md" onclick="event.stopPropagation()">
    <div class="mt" id="mpt">Nouveau programme</div>
    <div class="ig"><label class="il">Nom</label><input type="text" id="pni" placeholder="Upper 1, Lower 2..."></div>
    <div class="ig"><label class="il">Type</label>
      <div class="tsel">
        <div class="tag upper" data-t="upper" onclick="selT(this)">Upper</div>
        <div class="tag lower" data-t="lower" onclick="selT(this)">Lower</div>
        <div class="tag running" data-t="running" onclick="selT(this)">Running</div>
        <div class="tag cardio" data-t="cardio" onclick="selT(this)">Cardio</div>
      </div>
    </div>
    <div id="es2" style="display:none">
      <div class="sep"></div>
      <div class="stl">Exercices</div>
      <div id="ele"></div>
      <div class="aer" onclick="addERow()">+ Ajouter un exercice</div>
    </div>
    <div class="ma"><button class="btn btn-s" onclick="cm('mp')">Annuler</button><button class="btn btn-p" onclick="saveProg()">Enregistrer</button></div>
  </div>
</div>

<!-- MODAL CARDIO -->

<div id="mca" class="mo" onclick="cm('mca')">
  <div class="md" onclick="event.stopPropagation()">
    <div class="mt">Séance cardio</div>
    <div class="ig"><label class="il">Type</label>
      <select id="ctype"><option value="running">Running</option><option value="marche">Marche</option><option value="velo">Vélo</option><option value="rameur">Rameur</option><option value="tapis">Tapis incliné</option><option value="autre">Autre</option></select>
    </div>
    <div class="fr">
      <div class="ig"><label class="il">Distance (km)</label><input type="number" id="cdist" placeholder="0.0" step="0.1"></div>
      <div class="ig"><label class="il">Durée (min)</label><input type="number" id="cdur" placeholder="0"></div>
    </div>
    <div class="ig"><label class="il">Calories</label><input type="number" id="ccal" placeholder="0"></div>
    <div class="ig"><label class="il">Notes</label><input type="text" id="cnotes" placeholder="Allure, ressenti..."></div>
    <div class="ma"><button class="btn btn-s" onclick="cm('mca')">Annuler</button><button class="btn btn-p" onclick="saveCa()">Enregistrer</button></div>
  </div>
</div>

<!-- MODAL CHOISIR -->

<div id="mcp" class="mo" onclick="cm('mcp')">
  <div class="md" onclick="event.stopPropagation()">
    <div class="mt">Démarrer</div>
    <div id="cpl"></div>
    <div class="sep"></div>
    <button class="btn btn-s" onclick="openCa()">🏃 Cardio / Marche / Rameur</button>
  </div>
</div>

<script>
const PROGS_DEFAULT=[
  {id:'upper1',name:'Upper 1',type:'upper',blocs:[
    {name:'Bloc A',tours:4,repos:90,exercises:[
      {id:'u1a1',name:'Chest press machine',reps:'8-10',weights:[85,80,75,75]},
      {id:'u1a2',name:'Tirage vertical large',reps:'8-10',weights:[85,70,70,70]}]},
    {name:'Bloc B',tours:4,repos:90,exercises:[
      {id:'u1b1',name:'Rowing assis machine',reps:'12',weights:[50,40,40,40]},
      {id:'u1b2',name:'Élévations latérales',reps:'10',weights:[10,10,10,10]}]},
    {name:'Bloc C',tours:3,repos:90,exercises:[
      {id:'u1c1',name:'Pushdown triceps',reps:'8-10',weights:[50,50,50]},
      {id:'u1c2',name:'Curl haltères',reps:'10',weights:[14,14,14]}]}
  ],finisher:'Rameur'},
  {id:'lower1',name:'Lower 1',type:'lower',blocs:[
    {name:'Bloc A',tours:4,repos:90,exercises:[
      {id:'l1a1',name:'Hack squat',reps:'8-10',weights:[30,30,30,30]},

let S={darkMode:true,programmes:[],sessions:[],activeSession:null,timerInterval:null,timerRem:0,timerTotal:0,timerPaused:false};
let editExos=[],selType=null;

function loadS(){
  const sv=localStorage.getItem('tct_v3');
  if(sv){try{Object.assign(S,JSON.parse(sv))}catch(e){}}
  if(!S.programmes||S.programmes.length===0) S.programmes=JSON.parse(JSON.stringify(PROGS_DEFAULT));
  document.body.classList.toggle('light',!S.darkMode);
  document.getElementById('theme-toggle').textContent=S.darkMode?'🌙':'☀️';
}
function saveS(){localStorage.setItem('tct_v3',JSON.stringify(S))}
function uid(){return Math.random().toString(36).slice(2,10)}

function go(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.querySelector('[data-s="'+s+'"]').classList.add('active');
  if(s==='dashboard')rDash();
  if(s==='programmes')rProgs();
  if(s==='session')rSess();
  if(s==='historique')rHist();
  if(s==='progress')rProg();
}

function toggleTheme(){
  S.darkMode=!S.darkMode;
  document.body.classList.toggle('light',!S.darkMode);
  document.getElementById('theme-toggle').textContent=S.darkMode?'🌙':'☀️';
  saveS();
}

// DASHBOARD
function rDash(){
  const el=document.getElementById('dc');
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);
  const wk=S.sessions.filter(s=>new Date(s.date)>=mon).length;
  let dots='';
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ok=S.sessions.some(s=>new Date(s.date).toDateString()===d.toDateString());dots+=`<div class="sd ${ok?'done':''}"></div>`}
  const recent=[...S.sessions].reverse().slice(0,5);
  const rHTML=recent.length===0?'<div class="es"><div class="ic">🏋️</div>Aucune séance. Lance-toi !</div>':recent.map(s=>{
    const ic=s.type==='running'?'🏃':s.type==='cardio'?'🚴':s.type==='upper'?'💪':'🦵';
    const meta=(s.type==='cardio'||s.type==='running')?`${s.distance||'-'} km · ${s.duration||'-'} min`:`Vol. ${calcVol(s)} kg · ${s.duration||'-'} min`;
    return`<div class="ri"><div><div class="rin">${ic} ${s.name}</div><div class="rid">${fmtDate(s.date)}</div></div><div style="font-size:11px;color:var(--text2);text-align:right">${meta}</div></div>`;
  }).join('');
  el.innerHTML=`<div class="sg">
    <div class="sc"><div class="v">${S.sessions.length}</div><div class="l">Total</div></div>
    <div class="sc"><div class="v">${wk}</div><div class="l">Cette semaine</div></div>
    <div class="sc" style="grid-column:span 2"><div class="l">Activité 7 jours</div><div class="sbar" style="margin-top:10px">${dots}</div></div>
  </div>
  <button class="btn btn-p" style="margin-bottom:14px" onclick="openCP()">▶ DÉMARRER UNE SÉANCE</button>
  <div class="stl">Récent</div><div class="rl">${rHTML}</div>`;
}

function calcVol(s){
  let v=0;
  (s.blocs||[]).forEach(b=>(b.exercises||[]).forEach(e=>(e.sets||[]).forEach(x=>{v+=(parseFloat(x.weight)||0)*(parseInt(x.reps)||0)})));
  return v;
}
function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}
function badge(t){const m={upper:'b-up Upper',lower:'b-lo Lower',cardio:'b-ca Cardio',running:'b-ru Running'};const p=(m[t]||'b-ca Cardio').split(' ');return`<span class="badge ${p[0]}">${p[1]}</span>`}

// PROGRAMMES
function rProgs(){
  const el=document.getElementById('pl');
  if(!S.programmes.length){el.innerHTML='<div class="es"><div class="ic">📋</div>Aucun programme.</div>';return}
  el.innerHTML=S.programmes.map(p=>{
    if(p.type==='running'){
      return`<div class="pc"><div class="pch"><div><div class="pcn">${p.name}</div><div style="margin-top:4px">${badge(p.type)}</div></div><button class="btn btn-s btn-sm btn-ic del" onclick="delProg('${p.id}')">🗑️</button></div>${p.notes?`<div style="font-size:14px;color:var(--text2);white-space:pre-line;line-height:1.6">${p.notes}</div>`:''}</div>`;
    }
    const bH=(p.blocs||[]).map(b=>`<div style="margin-bottom:10px">
      <div class="pbt">${b.name} — ${b.tours} tours</div>
      ${b.exercises.map(e=>`<div class="pe"><div class="pen">${e.name}</div><div class="pem">${e.reps} · ${(e.weights||[]).slice(0,b.tours).join('/')} kg</div></div>`).join('')}
      <div class="pr">Repos : ${b.repos}s</div>
    </div>`).join('');
    const fH=p.finisher?`<div class="pfin">🔥 ${p.finisher}</div>`:'';
    return`<div class="pc"><div class="pch"><div><div class="pcn">${p.name}</div><div style="margin-top:4px">${badge(p.type)}</div></div><button class="btn btn-s btn-sm btn-ic del" onclick="delProg('${p.id}')">🗑️</button></div>${bH}${fH}</div>`;
  }).join('');
}

function openNewProg(){
  selType=null;editExos=[];
  document.getElementById('pni').value='';
  document.getElementById('mpt').textContent='Nouveau programme';
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('sel'));
  document.getElementById('es2').style.display='none';
  document.getElementById('ele').innerHTML='';
  om('mp');
}

function selT(el){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('sel'));
  el.classList.add('sel');selType=el.dataset.t;
  const show=selType!=='running'&&selType!=='cardio';
  document.getElementById('es2').style.display=show?'block':'none';
  if(show&&!editExos.length)addERow();
}

function addERow(){editExos.push({id:uid(),name:'',sets:3,reps:10,weight:0});rELE()}
function rELE(){
  document.getElementById('ele').innerHTML=editExos.map((e,i)=>`
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:7px">
      <input type="text" placeholder="Exercice" value="${e.name}" style="flex:2;padding:7px 9px;font-size:13px" oninput="editExos[${i}].name=this.value">
      <input type="number" placeholder="×" value="${e.sets}" style="flex:0.55;padding:7px 4px;font-size:13px;text-align:center" oninput="editExos[${i}].sets=parseInt(this.value)||0">
      <input type="number" placeholder="reps" value="${e.reps}" style="flex:0.65;padding:7px 4px;font-size:13px;text-align:center" oninput="editExos[${i}].reps=parseInt(this.value)||0">
      <input type="number" placeholder="kg" value="${e.weight}" style="flex:0.65;padding:7px 4px;font-size:13px;text-align:center" oninput="editExos[${i}].weight=parseFloat(this.value)||0">
      <button class="del" onclick="editExos.splice(${i},1);rELE()">✕</button>
    </div>`).join('');
}

function saveProg(){
  const n=document.getElementById('pni').value.trim();
  if(!n){alert('Donne un nom.');return}if(!selType){alert('Choisis un type.');return}
  const isC=selType==='running'||selType==='cardio';
  S.programmes.push({id:uid(),name:n,type:selType,blocs:isC?[]:[{name:'Exercices',tours:editExos[0]?.sets||3,repos:90,exercises:editExos.filter(e=>e.name).map(e=>({id:uid(),name:e.name,reps:String(e.reps),weights:Array.from({length:e.sets},()=>e.weight)}))}],finisher:null,notes:isC?'':undefined});
  saveS();cm('mp');rProgs();
}

function delProg(id){if(!confirm('Supprimer ?'))return;S.programmes=S.programmes.filter(p=>p.id!==id);saveS();rProgs()}

// SESSION
function openCP(){
  const el=document.getElementById('cpl');
  el.innerHTML=S.programmes.map(p=>`<div class="ri" style="margin-bottom:7px;cursor:pointer" onclick="startSess('${p.id}')"><div><div class="rin">${p.name}</div><div style="margin-top:3px">${badge(p.type)}</div></div><div style="color:var(--text2);font-size:22px">›</div></div>`).join('');
  om('mcp');
}

function startSess(pid){
  const p=S.programmes.find(x=>x.id===pid);if(!p)return;
  cm('mcp');
  if(p.type==='running'){
    S.activeSession={id:uid(),progId:p.id,name:p.name,type:'running',date:new Date().toISOString(),startTime:Date.now(),notes:p.notes||'',blocs:[]};
    saveS();go('session');return;
  }
  if(p.type==='cardio'){openCa();return}
  const blocs=(p.blocs||[]).map(b=>({...b,exercises:b.exercises.map(e=>({...e,sets:Array.from({length:b.tours},(_,i)=>({id:uid(),reps:parseInt(e.reps)||10,weight:(e.weights&&e.weights[i]!=null)?e.weights[i]:0,done:false}))}))}));
  S.activeSession={id:uid(),progId:p.id,name:p.name,type:p.type,date:new Date().toISOString(),startTime:Date.now(),blocs,finisher:p.finisher||null};
  saveS();go('session');
}

function openCa(){
  cm('mcp');
  ['cdist','cdur','ccal','cnotes'].forEach(id=>document.getElementById(id).value='');
  om('mca');
}

function saveCa(){
  const t=document.getElementById('ctype').value;
  const names={running:'Running',marche:'Marche',velo:'Vélo',rameur:'Rameur',tapis:'Tapis incliné',autre:'Cardio'};
  S.sessions.push({id:uid(),name:names[t]||'Cardio',type:'cardio',date:new Date().toISOString(),distance:parseFloat(document.getElementById('cdist').value)||0,duration:parseInt(document.getElementById('cdur').value)||0,calories:parseInt(document.getElementById('ccal').value)||0,notes:document.getElementById('cnotes').value,blocs:[]});
  saveS();cm('mca');go('historique');
}

function rSess(){
  const el=document.getElementById('sc');
  if(!S.activeSession){
    el.innerHTML=`<div style="padding:max(20px,env(safe-area-inset-top)) 14px calc(76px + env(safe-area-inset-bottom))"><div class="ph"><div class="pt">SÉ<span>ANCE</span></div></div><div class="es"><div class="ic">▶</div>Aucune séance en cours.</div><button class="btn btn-p" onclick="openCP()">▶ DÉMARRER</button></div>`;
    return;
  }
  const s=S.activeSession;
  if(s.type==='running'){
    el.innerHTML=`<div style="padding:max(20px,env(safe-area-inset-top)) 14px calc(76px + env(safe-area-inset-bottom))"><div class="ph"><div><div class="pt" style="font-size:24px">${s.name}</div><div style="margin-top:4px">${badge('running')}</div></div><button class="btn btn-s btn-sm" style="width:auto" onclick="cancelSess()">Annuler</button></div><div class="card" style="white-space:pre-line;font-size:16px;font-weight:600;line-height:1.9">${s.notes}</div><button class="btn btn-p" style="margin-top:12px" onclick="finishRun()">✓ TERMINER</button></div>`;
    return;
  }
  const total=s.blocs.reduce((a,b)=>a+b.exercises.reduce((c,e)=>c+e.sets.length,0),0);
  const done=s.blocs.reduce((a,b)=>a+b.exercises.reduce((c,e)=>c+e.sets.filter(x=>x.done).length,0),0);
  const pct=total?Math.round(done/total*100):0;
  const bH=s.blocs.map((b,bi)=>{
    const eH=b.exercises.map((e,ei)=>{
      const dc=e.sets.filter(x=>x.done).length;
      const sH=e.sets.map((set,si)=>`<div class="sr">
        <div class="sn">${si+1}</div>
        <input class="si" type="number" value="${set.weight}" placeholder="kg" oninput="uSet(${bi},${ei},${si},'weight',this.value)">
        <span class="ss">kg×</span>
        <input class="si" type="number" value="${set.reps}" placeholder="reps" oninput="uSet(${bi},${ei},${si},'reps',this.value)">
        <button class="sd2 ${set.done?'ck':''}" onclick="tSet(${bi},${ei},${si})">${set.done?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>':''}</button>
      </div>`).join('');
      return`<div class="se"><div class="seh"><div class="sen">${e.name}</div><div style="font-size:11px;color:var(--text2);font-family:'DM Mono',monospace">${dc}/${e.sets.length}</div></div>${sH}</div>`;
    }).join('');
    return`<div class="sb"><div class="sbt">${b.name} — ${b.tours} tours</div>${eH}<div class="rbar"><span>REPOS : ${b.repos}s</span><button class="rbtn" onclick="startT(${b.repos})">⏱ LANCER</button></div></div>`;
  }).join('');
  const fH=s.finisher?`<div class="sfin"><div class="sfin-t">🔥 Finisher</div><div style="font-size:14px;font-weight:700">${s.finisher}</div></div>`:'';
  const allD=done===total&&total>0;
  el.innerHTML=`<div class="shb"><div><div class="pt" style="font-size:22px">${s.name}</div><div style="margin-top:4px">${badge(s.type)}</div></div><button class="btn btn-s btn-sm" style="width:auto" onclick="cancelSess()">Annuler</button></div>
  <div style="padding:8px 14px 4px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px"><span>PROGRESSION</span><span style="color:var(--abright);font-weight:800">${pct}%</span></div><div class="pbo"><div class="pbi" style="width:${pct}%"></div></div></div>
  <div style="padding:10px 14px calc(76px + env(safe-area-inset-bottom))">${bH}${fH}${allD?'<button class="btn btn-p" onclick="finishSess()">✓ TERMINER LA SÉANCE</button>':''}</div>`;
}

function uSet(bi,ei,si,f,v){if(!S.activeSession)return;S.activeSession.blocs[bi].exercises[ei].sets[si][f]=parseFloat(v)||0;saveS()}
function tSet(bi,ei,si){
  if(!S.activeSession)return;
  const set=S.activeSession.blocs[bi].exercises[ei].sets[si];
  set.done=!set.done;saveS();
  if(set.done)startT(S.activeSession.blocs[bi].repos||90);
  rSess();
}
function cancelSess(){if(!confirm('Abandonner ?'))return;S.activeSession=null;saveS();rSess()}
function finishSess(){
  const s=S.activeSession,dur=Math.round((Date.now()-s.startTime)/60000);
  S.sessions.push({...s,duration:dur});S.activeSession=null;saveS();
  const vol=calcVol(s);
  document.getElementById('sc').innerHTML=`<div class="done-sc" style="padding-top:max(60px,env(safe-area-inset-top))"><div class="di">🏆</div><div class="dt">GG !</div><div class="ds">${s.name} · ${dur} min</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px"><span class="vb">Vol : ${vol} kg</span><span class="vb">${s.blocs?.length||0} blocs</span></div><button class="btn btn-p" onclick="go('dashboard')">RETOUR</button></div>`;
}
function finishRun(){
  const s=S.activeSession,dur=Math.round((Date.now()-s.startTime)/60000);
  S.activeSession=null;saveS();
  document.getElementById('cdur').value=dur;
  document.getElementById('ctype').value='running';
  om('mca');
}

// TIMER
function startT(sec){
  if(S.timerInterval)clearInterval(S.timerInterval);
  document.querySelectorAll('.tpr').forEach(p=>p.classList.toggle('act',parseInt(p.dataset.s)===sec));
  document.getElementById('tci').value='';
  S.timerTotal=sec;S.timerRem=sec;S.timerPaused=false;
  document.getElementById('tpb').textContent='Pause';
  uTUI();document.getElementById('to').classList.add('vis');
  S.timerInterval=setInterval(()=>{
    if(!S.timerPaused){S.timerRem--;uTUI();if(S.timerRem<=0){clearInterval(S.timerInterval);document.getElementById('to').classList.remove('vis');if('vibrate' in navigator)navigator.vibrate([300,100,300])}}
  },1000);
}
function setT(el,s){startT(s)}
function setTCustom(v){const n=parseInt(v);if(n>=10&&n<=180){document.querySelectorAll('.tpr').forEach(p=>p.classList.remove('act'));startT(n)}}
function uTUI(){
  const p=S.timerRem/S.timerTotal,c=578;
  const m=Math.floor(S.timerRem/60),s=S.timerRem%60;
  document.getElementById('td').textContent=S.timerRem>=60?`${m}:${String(s).padStart(2,'0')}`:S.timerRem;
  document.getElementById('tu').textContent=S.timerRem>=60?'min':'sec';
  document.getElementById('tpc').style.strokeDashoffset=c*(1-p);
}
function skipT(){clearInterval(S.timerInterval);document.getElementById('to').classList.remove('vis')}
function pauseT(){S.timerPaused=!S.timerPaused;document.getElementById('tpb').textContent=S.timerPaused?'Reprendre':'Pause'}

// HISTORIQUE
function rHist(){
  const el=document.getElementById('hc');
  if(!S.sessions.length){el.innerHTML='<div class="es"><div class="ic">📊</div>Aucun historique.</div>';return}
  el.innerHTML=[...S.sessions].reverse().map(s=>{
    const ic=s.type==='running'?'🏃':s.type==='cardio'?'🚴':s.type==='upper'?'💪':'🦵';
    const st=(s.type==='cardio'||s.type==='running')?
      `<div class="hst">Dist: <strong>${s.distance||'-'} km</strong></div><div class="hst">Durée: <strong>${s.duration||'-'} min</strong></div>${s.calories?`<div class="hst">Cal: <strong>${s.calories}</strong></div>`:''}`
      :`<div class="hst">Vol: <strong>${calcVol(s)} kg</strong></div><div class="hst">Durée: <strong>${s.duration||'-'} min</strong></div>`;
    return`<div class="hi"><div class="hih"><div class="hin">${ic} ${s.name}</div><div class="hid">${fmtDate(s.date)}</div></div><div style="margin-bottom:7px">${badge(s.type)}</div><div class="hs">${st}</div></div>`;
  }).join('');
}

// PROGRESSION
function rProg(){
  const el=document.getElementById('pgc');
  const ms=S.sessions.filter(s=>s.type!=='cardio'&&s.type!=='running'&&s.blocs);
  const cs=S.sessions.filter(s=>s.type==='cardio'||s.type==='running');
  const names=new Set();
  ms.forEach(s=>(s.blocs||[]).forEach(b=>(b.exercises||[]).forEach(e=>names.add(e.name))));
  if(!names.size&&!cs.length){el.innerHTML='<div class="es"><div class="ic">📈</div>Fais quelques séances !</div>';return}
  let h='';
  names.forEach(n=>{
    const data=[];
    ms.forEach(s=>(s.blocs||[]).forEach(b=>{const e=b.exercises?.find(x=>x.name===n);if(e){const mw=Math.max(...(e.sets||[]).filter(x=>x.done).map(x=>parseFloat(x.weight)||0),0);if(mw>0)data.push(mw)}}));
    if(!data.length)return;
    const pr=Math.max(...data);
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:14px;font-weight:800;text-transform:uppercase">${n}</div><div style="font-size:13px;font-family:'DM Mono',monospace">PR : <strong style="color:gold">${pr} kg</strong></div></div><div class="pch2">${mChart(data,pr)}</div></div>`;
  });
  if(cs.length){
    const r=cs.slice(-10),mx=Math.max(...r.map(s=>s.distance||0),1);
    h+=`<div class="card"><div style="font-size:14px;font-weight:800;text-transform:uppercase;margin-bottom:4px">Distance cardio</div><div class="pch2">${mChart(r.map(s=>s.distance||0),mx,'#3ddc68')}</div></div>`;
  }
  el.innerHTML=h||'<div class="es">Pas assez de données.</div>';
}

function mChart(vals,mx,col){
  const n=vals.length;if(!n||!mx)return'';
  const bw=Math.floor(88/n),gap=n>1?(88-bw*n)/(n-1):0;
  return vals.map((v,i)=>`<div class="cb" style="left:${6+i*(bw+gap)}%;width:${bw}%;height:${(v/mx)*85}%;background:${col||'var(--accent)'}"></div>`).join('');
}

function om(id){document.getElementById(id).classList.add('vis')}
function cm(id){document.getElementById(id).classList.remove('vis')}

loadS();rDash();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
